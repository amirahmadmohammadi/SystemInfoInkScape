<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
     width="400" height="300" viewBox="0 0 400 300">
  
  <title>Test Document for Icon Inserter Extension</title>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Test Shape 1: Rectangle -->
  <rect x="50" y="50" width="100" height="80" 
        fill="#4CAF50" stroke="#2E7D32" stroke-width="2"
        id="test-rectangle"
        inkscape:label="Test Rectangle"/>
  
  <!-- Test Shape 2: Circle -->
  <circle cx="250" cy="90" r="40" 
          fill="#2196F3" stroke="#1565C0" stroke-width="2"
          id="test-circle"
          inkscape:label="Test Circle"/>
  
  <!-- Test Shape 3: Ellipse -->
  <ellipse cx="150" cy="200" rx="60" ry="40" 
           fill="#FF9800" stroke="#EF6C00" stroke-width="2"
           id="test-ellipse"
           inkscape:label="Test Ellipse"/>
  
  <!-- Instructions Text -->
  <text x="200" y="270" text-anchor="middle" 
        font-family="sans-serif" font-size="12" fill="#333">
    Select any shape above and run Extensions → Custom → Icon Inserter
  </text>
  
  <!-- Metadata -->
  <sodipodi:namedview id="base" pagecolor="#ffffff" bordercolor="#666666">
    <sodipodi:guide label="Instructions">
      1. Select a shape (rectangle, circle, or ellipse)
      2. Go to Extensions menu
      3. Choose Custom → Icon Inserter
      4. Select an icon, adjust transformations, add metadata
      5. Click Apply
    </sodipodi:guide>
  </sodipodi:namedview>
</svg>
